# 测试 CI：四个技术栈的单元套件 + BDD e2e，全部带分层覆盖率门槛。
#
# 门槛定义（不在这里，在各自配置里，改门槛不用碰 CI）：
# - Elixir：mix.exs test_coverage — 业务逻辑 ≥75%（副作用/框架模块已排除）
# - 前端：assets/vitest.config.ts thresholds — 纯逻辑模块 ≥90% 行覆盖，
#   集成组件由 e2e 场景兜底，全局仅设防删测试的地板
# - 客户端/Rust：无覆盖率工具，以测试全绿为门槛
name: test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  elixir:
    name: Elixir（${{ matrix.label }}）
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux，覆盖率门槛 75%
          - os: windows-2022
            label: Windows，覆盖率门槛 75%
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - uses: dtolnay/rust-toolchain@stable
      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
        with:
          arch: x64
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            native/dala_holder/target
            native/dala_git/target
            native/dala_theme_renderer/target
          # v3: BEAM-without-NIF poisoning happened twice (v2 was the first
          # bump). The guard step below now self-heals it; the bump just
          # discards the currently poisoned generation.
          key: elixir-v3-${{ runner.os }}-${{ hashFiles('mix.lock', 'mix.exs', 'native/**/Cargo.lock', 'native/**/Cargo.toml', 'native/**/src/**', 'lib/dala/git.ex', 'lib/dala/theme_renderer.ex') }}
      # NIF 守卫：缓存若存有 dala 的 BEAM 却没有 Rustler .so（取消/中断的
      # run 存下的半成品缓存），mix 会认为已编译而静默跳过 NIF——删掉该
      # app 的 _build 强制重编，自愈而不是再红一轮。
      - name: guard against BEAM-without-NIF poisoned cache
        if: runner.os == 'Linux'
        run: |
          for env in dev test; do
            if [ -d "_build/$env/lib/dala/ebin" ] && [ ! -f "_build/$env/lib/dala/priv/native/dala_git.so" ]; then
              echo "poisoned cache: _build/$env has BEAMs but no NIF — forcing rebuild"
              rm -rf "_build/$env/lib/dala"
            fi
          done
      # file_watch_socket_test 断言 inotify 后端，runner 默认没有
      - run: sudo apt-get update && sudo apt-get install -y inotify-tools
        if: runner.os == 'Linux'
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - name: Run tests with coverage
        run: mix test --cover

  frontend:
    name: 前端（${{ matrix.label }}，vitest 分层门槛 + typecheck）
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
          - os: windows-2022
            label: Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # phoenix/phoenix_html/phoenix_live_view 的 JS 是 file:../deps 链接，
      # 来自 hex 包——npm 依赖完整需要先取 Elixir deps（只下载不编译）
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - uses: actions/cache@v4
        with:
          path: deps
          key: mix-deps-${{ runner.os }}-${{ hashFiles('mix.lock') }}
      - run: mix deps.get
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: assets/package-lock.json
      - run: npm ci
        working-directory: assets
      - run: npm run typecheck
        working-directory: assets
      - run: npx vitest run --coverage
        working-directory: assets

  client:
    name: Electron 客户端（node:test）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # 客户端测试零 npm 依赖（node:test + 只读 keybindings.ts），无需 install
      - run: npm test
        working-directory: clients/desktop

  rust:
    name: Rust native crates（${{ matrix.label }}，cargo test）
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: Linux
          - os: windows-2022
            label: Windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
        with:
          arch: x64
      - uses: actions/cache@v4
        with:
          path: |
            native/dala_holder/target
            native/dala_git/target
            native/dala_theme_renderer/target
          key: rust-native-${{ runner.os }}-${{ hashFiles('native/dala_holder/Cargo.lock', 'native/dala_git/Cargo.lock', 'native/dala_theme_renderer/Cargo.lock') }}
      - run: cargo test
        working-directory: native/dala_holder
      - run: cargo test
        working-directory: native/dala_git
      - run: cargo test
        working-directory: native/dala_theme_renderer

  windows-release:
    name: Windows release smoke test
    runs-on: windows-2022
    env:
      MIX_ENV: prod
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: assets/package-lock.json
      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Install dependencies
        shell: pwsh
        run: |
          mix deps.get --only prod
          npm ci --prefix assets
      - name: Build and smoke-test the Windows release
        shell: pwsh
        run: |
          mix compile --warnings-as-errors
          mix tailwind.install --if-missing
          mix esbuild.install --if-missing
          mix assets.deploy
          mix release --overwrite
          Copy-Item "priv/windows/run-dala.ps1" "_build/prod/rel/dala/run-dala.ps1"
          ./ci/windows-release-smoke.ps1

  e2e:
    name: BDD e2e（Playwright 8 场景）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            native/dala_holder/target
            native/dala_git/target
            native/dala_theme_renderer/target
          key: elixir-v3-${{ runner.os }}-${{ hashFiles('mix.lock', 'mix.exs', 'native/**/Cargo.lock', 'native/**/Cargo.toml', 'native/**/src/**', 'lib/dala/git.ex', 'lib/dala/theme_renderer.ex') }}
      # NIF 守卫：缓存若存有 dala 的 BEAM 却没有 Rustler .so（取消/中断的
      # run 存下的半成品缓存），mix 会认为已编译而静默跳过 NIF——删掉该
      # app 的 _build 强制重编，自愈而不是再红一轮。
      - name: guard against BEAM-without-NIF poisoned cache
        run: |
          for env in dev test; do
            if [ -d "_build/$env/lib/dala/ebin" ] && [ ! -f "_build/$env/lib/dala/priv/native/dala_git.so" ]; then
              echo "poisoned cache: _build/$env has BEAMs but no NIF — forcing rebuild"
              rm -rf "_build/$env/lib/dala"
            fi
          done
      - run: sudo apt-get update && sudo apt-get install -y sqlite3
      - run: mix setup
      - run: npm ci
        working-directory: e2e
      - run: npx playwright install --with-deps chromium
        working-directory: e2e
      # CHROMIUM_BIN="" → 用 playwright 自带 chromium（本地默认 /usr/bin/chromium）
      - run: CHROMIUM_BIN="" npx playwright test
        working-directory: e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-traces
          path: e2e/test-results/
          retention-days: 7
