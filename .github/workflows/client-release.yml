name: Client Release

# Desktop client releases only. Tag rule:
#   client-v*  → desktop client (this workflow)
#   v*         → server tarball (release.yml)
# The client version comes from the tag (client-v0.1.0 → 0.1.0), so
# clients/desktop/package.json never needs a version bump commit.
on:
  push:
    tags: ["client-v*"]

permissions:
  contents: write

jobs:
  client:
    name: Desktop client (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            args: --linux
          - os: windows-latest
            args: --win
          # Universal binary: one .dmg for Apple Silicon AND Intel Macs.
          - os: macos-latest
            args: --mac --universal
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install client dependencies
        working-directory: clients/desktop
        run: npm install

      - name: Resolve version from tag
        shell: bash
        run: echo "CLIENT_VERSION=${GITHUB_REF_NAME#client-v}" >> "$GITHUB_ENV"

      # Written only when the secret exists; its absence downgrades macOS to
      # sign-without-notarize instead of failing the build.
      - name: Prepare App Store Connect API key
        id: asc
        if: startsWith(matrix.os, 'macos')
        env:
          KEY_B64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
        run: |
          if [ -n "$KEY_B64" ]; then
            echo -n "$KEY_B64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
            echo "key_path=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_OUTPUT"
          else
            echo "APPSTORE_API_KEY_BASE64 not set — signing only, skipping notarization"
          fi

      - name: Build (electron-builder)
        working-directory: clients/desktop
        shell: bash
        env:
          # macOS signing: electron-builder imports the p12 into a temp
          # keychain and codesigns with hardened runtime.
          CSC_LINK: ${{ startsWith(matrix.os, 'macos') && secrets.MACOS_CERTIFICATE_BASE64 || '' }}
          CSC_KEY_PASSWORD: ${{ startsWith(matrix.os, 'macos') && secrets.MACOS_CERTIFICATE_PASSWORD || '' }}
          # Notarization via App Store Connect API key (notarytool + staple).
          APPLE_API_KEY: ${{ steps.asc.outputs.key_path }}
          APPLE_API_KEY_ID: ${{ steps.asc.outputs.key_path && secrets.APPSTORE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ steps.asc.outputs.key_path && secrets.APPSTORE_API_ISSUER_ID || '' }}
        run: |
          npx electron-builder ${{ matrix.args }} --publish never \
            -c.extraMetadata.version="$CLIENT_VERSION"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clients/desktop/dist/*.dmg
            clients/desktop/dist/*.exe
            clients/desktop/dist/*.AppImage
            clients/desktop/dist/*.deb
          generate_release_notes: true
