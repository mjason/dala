name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build linux-x86_64 release
    runs-on: ubuntu-24.04
    env:
      MIX_ENV: prod
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: assets/package-lock.json

      - name: Cache mix deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.cargo/registry
            ~/.cargo/git
            native/dala_git/target
            native/dala_holder/target
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock', 'native/**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        # npm install (not ci): the lock file is written by npm 11 locally,
        # while the runner's node 22 bundles npm 10 whose `ci` validation
        # rejects it over optional-dependency entries.
        run: |
          mix deps.get --only prod
          npm install --prefix assets

      - name: Compile (Elixir + Rust NIF + PTY holder)
        run: mix compile

      - name: Build production assets (minified + digested)
        run: |
          mix tailwind.install --if-missing
          mix esbuild.install --if-missing
          mix assets.deploy

      - name: Assemble release
        run: mix release --overwrite

      - name: Package tarball
        run: |
          TAG="${GITHUB_REF_NAME}"
          OUT="dala-${TAG}-linux-x86_64.tar.gz"
          tar -C _build/prod/rel/dala -czf "$OUT" .
          sha256sum "$OUT" > "$OUT.sha256"
          echo "OUT=$OUT" >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.OUT }}
            ${{ env.OUT }}.sha256
          generate_release_notes: true
