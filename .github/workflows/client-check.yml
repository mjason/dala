name: Client check

on:
  push:
    branches: [main]
    paths: ["clients/desktop/**", ".github/workflows/client-check.yml"]
  pull_request:
    paths: ["clients/desktop/**"]

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Syntax-check main and preload
        working-directory: clients/desktop
        run: |
          node --check main.js
          node --check preload.js

      - name: Packaging dry-run (electron-builder --dir)
        working-directory: clients/desktop
        run: |
          npm install
          npx electron-builder --linux dir

      # Every module main.js requires must actually be inside the asar —
      # a missing entry in build.files crashes the app only at runtime.
      - name: Verify packaged modules
        working-directory: clients/desktop
        run: |
          for f in main.js preload.js updater.js; do
            npx @electron/asar list dist/linux-unpacked/resources/app.asar | grep -qx "/$f" \
              || { echo "MISSING $f in app.asar"; exit 1; }
          done
