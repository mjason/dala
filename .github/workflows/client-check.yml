name: Client check

on:
  push:
    branches: [main]
    paths: ["clients/desktop/**", ".github/workflows/client-check.yml"]
  pull_request:
    paths: ["clients/desktop/**"]

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install webkit/gtk dev dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            clients/desktop/src-tauri/target
          key: ${{ runner.os }}-client-${{ hashFiles('clients/desktop/src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-client-

      - name: cargo check + clippy
        working-directory: clients/desktop/src-tauri
        run: |
          cargo check --locked 2>/dev/null || cargo check
          cargo clippy -- -D warnings
