<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dala</title>
  <style>
    :root {
      --bg0: #0b0c0e; --bg1: #121417; --bg2: #1b1e23; --line: #24272c;
      --fg: #e6e8eb; --muted: #8f96a0; --mint: #4cc38a; --danger: #e5716e;
      --placeholder: #5b626b; --logo-bg: #15181c; --logo-line: #2c3037;
      color-scheme: dark;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg0: #f7f8fa; --bg1: #ffffff; --bg2: #e9edf2; --line: #d2d8e0;
        --fg: #1b2027; --muted: #68717d; --mint: #147a52; --danger: #c23b3b;
        --placeholder: #89939f; --logo-bg: #ffffff; --logo-line: #d2d8e0;
        color-scheme: light;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg0); color: var(--fg); min-height: 100vh;
      font: 14px/1.6 ui-monospace, "JetBrains Mono", "Cascadia Mono", Menlo, Consolas, monospace;
      display: grid; place-items: center; padding: 32px;
    }
    .card { width: 100%; max-width: 560px; }
    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
    .logo svg { width: 44px; height: 44px; }
    .logo h1 { font-size: 22px; letter-spacing: 0.14em; }
    .logo h1 i { color: var(--mint); font-style: normal; }
    .tagline { color: var(--muted); font-size: 12px; margin-bottom: 24px; }
    .section { color: var(--muted); font-size: 11px; text-transform: uppercase;
               letter-spacing: 0.1em; margin: 18px 0 8px; }
    #servers { border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
    #servers:empty { display: none; }
    .server { display: flex; align-items: center; gap: 10px; padding: 10px 14px;
              border-bottom: 1px solid var(--line); }
    .server:last-child { border-bottom: none; }
    .server .meta { flex: 1; min-width: 0; cursor: pointer; }
    .server .meta:hover .name { color: var(--mint); }
    .server .name { font-weight: 600; }
    .server .url { color: var(--muted); font-size: 12px; overflow: hidden;
                   text-overflow: ellipsis; white-space: nowrap; }
    button { font: inherit; font-size: 12px; border-radius: 6px; cursor: pointer;
             padding: 4px 10px; border: 1px solid var(--line);
             background: transparent; color: var(--muted); transition: all .15s; }
    button:hover { color: var(--fg); border-color: var(--muted); }
    button.primary { border-color: rgba(76,195,138,.5); color: var(--mint); }
    button.primary:hover { background: rgba(76,195,138,.1); border-color: var(--mint); }
    button.danger:hover { color: var(--danger); border-color: rgba(229,113,110,.6); }
    form { display: grid; grid-template-columns: 1fr 2fr auto; gap: 8px; margin-top: 8px; }
    input { font: inherit; font-size: 13px; background: var(--bg1); color: var(--fg);
            border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; outline: none; }
    input:focus { border-color: rgba(76,195,138,.6); }
    input::placeholder { color: var(--placeholder); }
    #error { color: var(--danger); font-size: 12px; margin-top: 8px; min-height: 18px; }
    .hint { color: var(--muted); font-size: 12px; margin-top: 20px; line-height: 1.8; }
    kbd { background: var(--bg2); border: 1px solid var(--line); border-radius: 4px;
          padding: 1px 5px; font-size: 11px; }
    .empty { border: 1px dashed var(--line); border-radius: 10px; padding: 22px;
             text-align: center; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <svg viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="var(--logo-bg)"/><rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="var(--logo-line)" stroke-width="2"/><path d="M17 21 L33 32 L17 43" fill="none" stroke="var(--mint)" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="37" y="39.5" width="13" height="7.5" rx="2.5" fill="var(--mint)"/></svg>
      <h1 id="title">DALA</h1>
    </div>
    <div class="tagline" data-i18n="tagline"></div>

    <div class="section" data-i18n="servers"></div>
    <div id="servers"></div>
    <div id="empty" class="empty" hidden data-i18n="empty"></div>

    <div class="section" data-i18n="add"></div>
    <form id="add-form">
      <input id="name" autocomplete="off" />
      <input id="url" placeholder="http://192.168.1.10:4400" autocomplete="off" required />
      <button type="submit" class="primary" data-i18n="addButton"></button>
    </form>
    <div id="error"></div>

    <div class="hint" id="hint"></div>
  </div>

  <script>
    const invoke = window.dala.invoke;
    const $ = (id) => document.getElementById(id);

    // --- i18n: same locale set as the dala web app -------------------------
    const MESSAGES = {
      en: { tagline: "connect to your dala servers", servers: "Servers", empty: "No servers yet — add one below ↓", add: "Add", addButton: "Add", namePh: "name (optional)", connect: "Connect", newWindow: "New window", remove: "Remove", hint: "Use the menu bar to switch servers ({kbd1}), open one in a new window, or come back here ({kbd2}).<br/>Each server keeps its own sign-in for 60 days." },
      "zh-CN": { tagline: "连接你的 dala 服务器", servers: "服务器", empty: "还没有服务器，先在下面添加一个 ↓", add: "添加", addButton: "添加", namePh: "名称（可选）", connect: "连接", newWindow: "新窗口", remove: "删除", hint: "菜单栏可随时切换服务器（{kbd1}）、新窗口打开、回到本页（{kbd2}）。<br/>每台服务器的登录状态独立保存，登录一次 60 天免登录。" },
      "zh-TW": { tagline: "連線你的 dala 伺服器", servers: "伺服器", empty: "還沒有伺服器，先在下面新增一個 ↓", add: "新增", addButton: "新增", namePh: "名稱（可選）", connect: "連線", newWindow: "新視窗", remove: "刪除", hint: "選單列可隨時切換伺服器（{kbd1}）、新視窗開啟、回到本頁（{kbd2}）。<br/>每台伺服器的登入狀態獨立保存，登入一次 60 天免登入。" },
      ja: { tagline: "dala サーバーに接続", servers: "サーバー", empty: "サーバーがまだありません — 下で追加してください ↓", add: "追加", addButton: "追加", namePh: "名前（任意）", connect: "接続", newWindow: "新しいウィンドウ", remove: "削除", hint: "メニューバーからサーバー切替（{kbd1}）、新規ウィンドウ、このページへ戻る（{kbd2}）。<br/>各サーバーのログインは 60 日間保持されます。" },
      ko: { tagline: "dala 서버에 연결", servers: "서버", empty: "아직 서버가 없습니다 — 아래에서 추가하세요 ↓", add: "추가", addButton: "추가", namePh: "이름 (선택)", connect: "연결", newWindow: "새 창", remove: "삭제", hint: "메뉴 막대에서 서버 전환({kbd1}), 새 창 열기, 이 페이지로 돌아오기({kbd2}).<br/>각 서버의 로그인은 60일간 유지됩니다." },
      es: { tagline: "conecta con tus servidores dala", servers: "Servidores", empty: "Aún no hay servidores: añade uno abajo ↓", add: "Añadir", addButton: "Añadir", namePh: "nombre (opcional)", connect: "Conectar", newWindow: "Nueva ventana", remove: "Eliminar", hint: "Usa la barra de menús para cambiar de servidor ({kbd1}), abrir en ventana nueva o volver aquí ({kbd2}).<br/>Cada servidor mantiene su sesión 60 días." },
      fr: { tagline: "connectez-vous à vos serveurs dala", servers: "Serveurs", empty: "Aucun serveur — ajoutez-en un ci-dessous ↓", add: "Ajouter", addButton: "Ajouter", namePh: "nom (facultatif)", connect: "Connecter", newWindow: "Nouvelle fenêtre", remove: "Supprimer", hint: "La barre de menus permet de changer de serveur ({kbd1}), d’ouvrir une fenêtre ou de revenir ici ({kbd2}).<br/>Chaque serveur garde sa session 60 jours." },
      de: { tagline: "verbinde dich mit deinen dala-Servern", servers: "Server", empty: "Noch keine Server — unten hinzufügen ↓", add: "Hinzufügen", addButton: "Hinzufügen", namePh: "Name (optional)", connect: "Verbinden", newWindow: "Neues Fenster", remove: "Entfernen", hint: "Über die Menüleiste: Server wechseln ({kbd1}), neues Fenster, zurück hierher ({kbd2}).<br/>Jeder Server behält seine Anmeldung 60 Tage." },
      ru: { tagline: "подключение к серверам dala", servers: "Серверы", empty: "Серверов пока нет — добавьте ниже ↓", add: "Добавить", addButton: "Добавить", namePh: "имя (необязательно)", connect: "Подключить", newWindow: "Новое окно", remove: "Удалить", hint: "Меню: переключение серверов ({kbd1}), новое окно, вернуться сюда ({kbd2}).<br/>Вход на каждый сервер сохраняется 60 дней." },
      pt: { tagline: "conecte-se aos seus servidores dala", servers: "Servidores", empty: "Nenhum servidor ainda — adicione abaixo ↓", add: "Adicionar", addButton: "Adicionar", namePh: "nome (opcional)", connect: "Conectar", newWindow: "Nova janela", remove: "Remover", hint: "Use a barra de menus para trocar de servidor ({kbd1}), abrir em nova janela ou voltar aqui ({kbd2}).<br/>Cada servidor mantém o login por 60 dias." },
    };

    function pickLocale() {
      const langs = navigator.languages || [navigator.language || "en"];
      for (const raw of langs) {
        const lang = raw.toLowerCase();
        if (lang.startsWith("zh")) {
          return lang.includes("tw") || lang.includes("hk") || lang.includes("hant") ? "zh-TW" : "zh-CN";
        }
        const base = lang.slice(0, 2);
        for (const key of Object.keys(MESSAGES)) {
          if (key.toLowerCase().startsWith(base)) return key;
        }
      }
      return "en";
    }

    const T = MESSAGES[pickLocale()] ?? MESSAGES.en;
    for (const el of document.querySelectorAll("[data-i18n]")) {
      el.textContent = T[el.dataset.i18n] ?? "";
    }
    $("name").placeholder = T.namePh;
    $("hint").innerHTML = T.hint
      .replace("{kbd1}", "<kbd>Ctrl/⌘+1..9</kbd>")
      .replace("{kbd2}", "<kbd>Ctrl/⌘+,</kbd>");

    function render(cfg) {
      const list = $("servers");
      list.innerHTML = "";
      $("empty").hidden = cfg.servers.length > 0;
      for (const server of cfg.servers) {
        const row = document.createElement("div");
        row.className = "server";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.title = T.connect;
        meta.innerHTML = `<div class="name"></div><div class="url"></div>`;
        meta.querySelector(".name").textContent =
          (cfg.last === server.url ? "✓ " : "") + server.name;
        meta.querySelector(".url").textContent = server.url;
        meta.onclick = () => invoke("connect", { url: server.url }).catch(showError);

        const newWin = document.createElement("button");
        newWin.textContent = T.newWindow;
        newWin.onclick = () => invoke("open_in_new_window", { url: server.url }).catch(showError);

        const del = document.createElement("button");
        del.className = "danger";
        del.textContent = T.remove;
        del.onclick = () =>
          invoke("remove_server", { url: server.url }).then(render).catch(showError);

        row.append(meta, newWin, del);
        list.append(row);
      }
    }

    function showError(err) {
      $("error").textContent = String(err);
    }

    $("add-form").onsubmit = (e) => {
      e.preventDefault();
      showError("");
      invoke("add_server", { name: $("name").value, url: $("url").value })
        .then((cfg) => {
          $("name").value = "";
          $("url").value = "";
          render(cfg);
        })
        .catch(showError);
    };

    invoke("list_servers").then(render).catch(showError);
  </script>
</body>
</html>
