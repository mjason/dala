<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dala</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 40px; margin: 0; overflow: hidden; }
    body {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px 0 12px;
      border-bottom: 1px solid light-dark(#dfe3e8, #2a2e34);
      background: light-dark(#f2f3f5, #20252a);
      color: light-dark(#31363d, #e4e7eb);
      font: 13px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-app-region: drag;
    }
    body[data-platform="darwin"] { padding-left: 78px; }
    body[data-platform="win32"] { padding-right: 144px; }
    #window-title {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: light-dark(#4a5058, #cbd0d7);
      font-weight: 600;
    }
    button {
      width: 30px;
      height: 30px;
      flex: none;
      display: grid;
      place-items: center;
      padding: 0;
      border: 0;
      border-radius: 5px;
      background: transparent;
      color: inherit;
      font: inherit;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    button:hover { background: light-dark(rgba(0, 0, 0, .08), rgba(255, 255, 255, .1)); }
    button:focus-visible { outline: 2px solid #4cc38a; outline-offset: 1px; }
    button svg { width: 16px; height: 16px; display: block; color: light-dark(#5b626b, #aab1ba); }
    button:hover svg { color: inherit; }
  </style>
</head>
<body>
  <div id="window-title">Dala</div>
  <button id="open" type="button" title="Open in system browser" aria-label="Open in system browser">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true">
      <circle cx="8" cy="8" r="6.25" />
      <ellipse cx="8" cy="8" rx="2.75" ry="6.25" />
      <path d="M2 5.9h12M2 10.1h12" />
    </svg>
  </button>
  <script>
    const invoke = window.dala.invoke;
    invoke("browser_state")
      .then((state) => {
        document.body.dataset.platform = state.platform;
        document.getElementById("window-title").textContent = state.title || "Dala";
        document.getElementById("open").title = state.openInSystemBrowser;
        document.getElementById("open").setAttribute("aria-label", state.openInSystemBrowser);
      })
      .catch(console.error);
    window.addEventListener("dala:browser-title", (event) => {
      document.getElementById("window-title").textContent = event.detail || "Dala";
    });
    document.getElementById("open").onclick = () =>
      invoke("open_current_in_system_browser").catch(console.error);
  </script>
</body>
</html>
