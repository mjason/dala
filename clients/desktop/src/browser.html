<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dala</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 44px; margin: 0; overflow: hidden; }
    body {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 10px;
      border-bottom: 1px solid light-dark(#dfe3e8, #2a2e34);
      background: light-dark(#f7f8fa, #17191d);
      color: light-dark(#31363d, #e4e7eb);
      font: 13px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    button {
      height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 11px;
      border: 1px solid light-dark(#cfd5dc, #383d45);
      border-radius: 6px;
      background: light-dark(#ffffff, #202329);
      color: inherit;
      font: inherit;
      cursor: pointer;
      max-width: 100%;
    }
    button:hover { border-color: light-dark(#8e99a6, #697481); }
    button:focus-visible { outline: 2px solid #4cc38a; outline-offset: 1px; }
    .icon { font-size: 16px; line-height: 1; }
    #label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <button id="open" type="button">
    <span class="icon" aria-hidden="true">↗</span>
    <span id="label">Open in system browser</span>
  </button>
  <script>
    const invoke = window.dala.invoke;
    invoke("browser_state")
      .then((state) => { document.getElementById("label").textContent = state.openInSystemBrowser; })
      .catch(console.error);
    document.getElementById("open").onclick = () =>
      invoke("open_current_in_system_browser").catch(console.error);
  </script>
</body>
</html>
